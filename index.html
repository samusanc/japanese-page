<!DOCTYPE html>
<html lang="en">
<head>
<script>
  if (!window.location.pathname.endsWith('/') && !window.location.pathname.split('/').pop().includes('.')) {
    window.location.replace(window.location.pathname + '/' + window.location.search + window.location.hash);
  }
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0d0a1a">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script>
  // Eruda mobile debug console — only when the page is opened with ?debug=1
  if (new URLSearchParams(location.search).has('debug')) {
    var _eruda = document.createElement('script');
    _eruda.src = 'https://cdn.jsdelivr.net/npm/eruda';
    _eruda.onload = function () { eruda.init(); };
    document.head.appendChild(_eruda);
  }
</script>
<title>活用! Katsuyo — Daily Japanese Battles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="./kanji-data.js"></script>
<script type="module" src="./src/main.js"></script>
</head>
<body>
<div id="app">

  <main>
    <!-- ============ HOME ============ -->
    <!-- Screen hosts — each module injects its markup at init() -->
    <section id="s-home" class="screen on"></section>
    <section id="s-practice" class="screen"></section>
    <section id="s-kanji" class="screen"></section>
    <section id="s-learn" class="screen"></section>
    <section id="s-group" class="screen"></section>
    <section id="s-result" class="screen"></section>
  </main>


  <nav>
    <button class="tab on" data-s="home"><span class="kj">今</span><span class="en">Today</span></button>
    <button class="tab" data-s="practice"><span class="kj">練</span><span class="en">Drill</span></button>
    <button class="tab" data-s="kanji"><span class="kj">書</span><span class="en">Kanji</span></button>
    <button class="tab" data-s="learn"><span class="kj">学</span><span class="en">Learn</span></button>
    <button class="tab" data-s="group"><span class="kj">友</span><span class="en">Squad</span></button>
  </nav>
</div>


<!-- Overlays (#vn, #kgame, #studio, #onb) are injected by their modules -->
<div class="toast" id="toast"></div>
</body>
</html>
