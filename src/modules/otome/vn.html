<div id="vn" class="overlay">
  <div class="vn-bg" id="vnBg"></div>
  <div class="vn-stage">
    <div class="g-top">
      <button class="g-quit" id="vnQuit">✕</button>
      <div style="flex:1"></div>
      <div class="g-score" id="vnScore" style="color:#fff; text-shadow:0 1px 8px rgba(0,0,0,.5);">0</div>
    </div>
    <div class="vn-hearts" id="vnHearts">❤️❤️</div>
    <div class="vn-sprite" id="vnSprite">👑</div>
    <div class="vn-yell" id="vnYell"></div>
    <div style="flex:1"></div>
    <div class="vn-kcards" id="vnKcards" style="display:none;"></div>
    <div class="vn-writer-area" id="vnWriterArea" style="display:none;">
      <div class="writer-box" id="vnWriterBox"><div class="stamp" id="vnStamp">正解</div></div>
      <div class="k-feedback" id="vnWFeedback"></div>
      <button class="hintbtn skipbtn" id="vnSkip" style="display:none; margin-top:6px;">⏩ Skip Kanji</button>
    </div>
    <div class="vn-bottom">
      <div class="vn-quiz-jp" id="vnQuizJp" style="display:none;"></div>
      <div class="vn-choices" id="vnChoices" style="display:none;"></div>
      <div class="vn-dialog" id="vnDialog">
        <div class="vn-name" id="vnName">???</div>
        <div class="vn-text" id="vnText"></div>
        <div class="vn-next" id="vnNext">▼</div>
      </div>
    </div>
    <div class="vn-ending" id="vnEnding"><div class="card" id="vnEndCard"></div></div>
  </div>
</div>
