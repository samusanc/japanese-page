<div id="game" class="overlay">
  <div class="g-top">
    <button class="g-quit" id="sprQuit" aria-label="quit">✕</button>
    <div class="timerwrap"><div id="timerbar"></div></div>
    <div class="g-score" id="sprScore">0</div>
  </div>
  <div class="g-combo" id="sprCombo"></div>
  <div class="g-body">
    <div class="qcard" style="position:relative;">
      <div id="count"><div class="n" id="countN">3</div></div>
      <div class="floatpts" id="sprPts"></div>
      <div class="q-form" id="sprForm"></div>
      <div class="q-form-en" id="sprFormEn"></div>
      <div class="q-word" id="sprWord"></div>
      <div class="q-kana" id="sprKana"></div>
      <div class="q-mean" id="sprMean"></div>
      <div class="q-type"><span class="badge ink" id="sprType"></span></div>
      <div class="explain" id="sprExplain" style="display:none;"></div>
    </div>
    <div class="choices" id="sprChoices"></div>
  </div>
</div>
