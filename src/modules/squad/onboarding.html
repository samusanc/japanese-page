<div id="onb">
  <div class="onb-inner">
    <div class="onb-hero">
      <div class="kj">活用<em>!</em></div>
      <h1>Daily Japanese battles</h1>
      <p class="sub">A 60-second conjugation sprint and five kanji to draw from memory — every day, against your friends.</p>
    </div>
    <div class="card">
      <span class="eyebrow">Your player name</span>
      <input class="inp" id="onbName" placeholder="e.g. Yuki" maxlength="14" style="margin-top:8px;">
      <span class="eyebrow" style="margin-top:16px; display:block;">Pick your avatar</span>
      <div class="emoji-grid" id="onbEmo"></div>
      <span class="eyebrow" style="margin-top:16px; display:block;">Squad code (optional)</span>
      <input class="inp" id="onbCode" placeholder="Have a friend's code? Enter it" maxlength="8" autocapitalize="characters" style="margin-top:6px;">
      <div style="height:18px"></div>
      <button class="btn" id="onbGo">Let's go — 行こう!</button>
    </div>
  </div>
</div>
