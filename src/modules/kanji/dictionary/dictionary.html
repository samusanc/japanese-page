      <h1 class="big">Kanji studio <span style="color:var(--ai)">書</span></h1>
      <p class="sub" style="margin-bottom:14px;">All N5 + N4 kanji with real stroke order. Tap one to watch, trace, then draw it from memory.</p>
      <div class="stat-strip">
        <div class="stat"><div class="v" id="kstN5">0<span style="font-size:12px;color:var(--ink2)">/110</span></div><div class="k">N5 mastered</div></div>
        <div class="stat"><div class="v" id="kstN4">0<span style="font-size:12px;color:var(--ink2)">/140</span></div><div class="k">N4 mastered</div></div>
      </div>
      <div class="seg" id="kanjiSeg">
        <button data-f="5" class="on">N5</button>
        <button data-f="4">N4</button>
        <button data-f="todo">To learn</button>
        <button data-f="done">Mastered</button>
      </div>
      <div class="kanji-grid" id="kanjiGrid"></div>
      <p class="note">Mastered = drawn from memory (Recall mode) with 2 mistakes or fewer. Dots: ● traced ● recalled.</p>
