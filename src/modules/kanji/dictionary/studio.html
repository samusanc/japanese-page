<div id="studio" class="overlay">
  <div class="g-top">
    <button class="g-quit" id="stClose">✕</button>
    <div style="flex:1" class="k-meta">
      <span class="bigk" id="stChar">水</span>
      <span class="badge" id="stLvl" style="margin-left:8px;">N5</span>
    </div>
    <div style="min-width:40px; text-align:right;" id="stStars"></div>
  </div>
  <div class="g-body" style="justify-content:flex-start; padding-top:0;">
    <div class="k-prompt">
      <div class="kmean" id="stMean">water</div>
      <div class="readings" id="stRead"></div>
    </div>
    <div class="writer-wrap"><div class="writer-box" id="stWriterBox"><div class="stamp" id="stStamp">正解</div></div></div>
    <div class="k-feedback" id="stFeedback"></div>
    <button class="hintbtn" id="stHint">👁 Reveal outline — counts as a fail</button>
    <div class="mode-row">
      <button class="mode-btn" id="mWatch">▶ Watch</button>
      <button class="mode-btn on" id="mTrace">Trace</button>
      <button class="mode-btn" id="mRecall">Recall</button>
    </div>
    <p class="note" style="text-align:center;">Watch the stroke order, trace over the outline, then draw it from memory. Recall with ≤2 mistakes = mastered ⭐</p>
  </div>
</div>
